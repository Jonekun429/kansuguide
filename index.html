<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PCスキル学習＆実践ナビ | 関数・ショートカット検索</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    :root {
      --primary: #5C8E84;
      --primary-dark: #3E6B62;
      --primary-light: #EDF4F2;
      --bg-page: #F6F7F5;
      --bg-card: #FFFFFF;
      --text-main: #2B3830;
      --text-sub: #7E928C;
      --border: #E5EBE8;
      --danger: #B36060;
    }
    
    * {
      font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
    }
    
    body {
      background-color: var(--bg-page);
      color: var(--text-main);
      margin: 0;
      padding: 0;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background-color: var(--border);
      border-radius: 20px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useCallback } = React;

    const DATABASE = [
      { id: 1, name: "SUM", cat: "合計・集計", desc: "指定した範囲の数値をすべて合計します。", example: "=SUM(A1:A10)", usecase: "【月次売上】営業データの売上欄をすべて足す。【帳簿】月間の収入合計を計算。", keywords: ["合計", "足す"], related: [2, 3], difficulty: 1, popular: true },
      { id: 2, name: "SUMIF", cat: "合計・集計", desc: "1つの条件を指定して、それに一致するセルの数値を合計します。", example: "=SUMIF(A1:A10, \"男\", B1:B10)", usecase: "【部門別売上】営業部の売上だけ合計。【帳簿】特定のカテゴリの支出だけを集計。", keywords: ["条件付き", "合計"], related: [1, 3], difficulty: 1, popular: true },
      { id: 3, name: "SUMIFS", cat: "合計・集計", desc: "複数の条件を指定して、それに一致するセルの数値を合計します。", example: "=SUMIFS(C1:C10, A1:A10, \"男\", B1:B10, \">=60\")", usecase: "【複雑な集計】東京営業所＆売上50万以上の案件だけ合計。", keywords: ["複数条件", "合計"], related: [1, 2], difficulty: 2, popular: false },
      { id: 8, name: "IF", cat: "条件分岐", desc: "条件を満たしている場合と満たしていない場合で、表示する値を変えます。", example: "=IF(A1=\"\", \"\", A1&B1)", usecase: "【成績判定】60点以上なら『合格』。【帳簿】売上がプラスなら『黒字』。", keywords: ["もし", "条件", "判定"], related: [9, 59], difficulty: 1, popular: true },
      { id: 9, name: "IFS", cat: "条件分岐", desc: "複数の条件を順に調べ、最初に満たした条件に対する値を返します。", example: "=IFS(A1>=80, \"優\", A1>=60, \"良\", A1<60, \"不\")", usecase: "【成績判定】80点以上『優』60点以上『良』。【在庫】100個以上『潤沢』。", keywords: ["複数条件", "順番"], related: [8, 60], difficulty: 2, popular: false },
      { id: 13, name: "VLOOKUP", cat: "検索・抽出", desc: "表を縦方向に検索し、一致したデータと同じ行にある指定した列のデータを取り出します。", example: "=VLOOKUP(A2, D2:F100, 2, FALSE)", usecase: "【商品コード検索】コードから商品名を引っ張る。【給与管理】従業員IDから基本給を取得。", keywords: ["検索", "定番"], related: [11, 43], difficulty: 1, popular: true },
      { id: 11, name: "XLOOKUP", cat: "検索・抽出", desc: "検索して対応する値を取り出します。（VLOOKUPの進化版）", example: "=XLOOKUP(\"1001\", A2:A10, B2:B10, \"該当なし\")", usecase: "【商品コード検索】商品コード1001の価格を取り出す。【顧客管理】顧客IDから住所を検索。", keywords: ["検索", "新しい"], related: [13, 43], difficulty: 2, popular: false },
      { id: 30, name: "ROUND", cat: "数学・計算", desc: "数値を指定した桁数で四捨五入します。", example: "=ROUND(A2, 0)", usecase: "【金額計算】税込価格を計算後、小数点以下を四捨五入。", keywords: ["四捨五入", "丸める"], related: [31, 32], difficulty: 1, popular: false },
      { id: 31, name: "ROUNDDOWN", cat: "数学・計算", desc: "数値を指定した桁数で切り捨てます。", example: "=ROUNDDOWN(A2, 0)", usecase: "【税抜計算】税込から消費税を引いて整数に。", keywords: ["切り捨て"], related: [30, 32], difficulty: 1, popular: false },
      { id: 33, name: "TODAY", cat: "日付・時刻", desc: "今日の日付を表示します。自動で更新されます。", example: "=TODAY()", usecase: "【請求期限】TODAY()+30で30日後を計算。", keywords: ["今日", "日付"], related: [34], difficulty: 1, popular: false },
      { id: 101, name: "コピー", cat: "ショートカット", desc: "選択したセルや文字をコピーします。", example: "Ctrl + C", keywords: ["コピー"], related: [102], type: "shortcut", difficulty: 1, popular: true },
      { id: 102, name: "貼り付け", cat: "ショートカット", desc: "コピーした内容を貼り付けます。", example: "Ctrl + V", keywords: ["貼り付け"], related: [101], type: "shortcut", difficulty: 1, popular: true },
      { id: 115, name: "スクショ", cat: "ショートカット", desc: "画面の指定範囲を撮影し、クリップボードにコピーします。", example: "Win + Shift + S", keywords: ["スクショ", "キャプチャ"], related: [], type: "shortcut", difficulty: 1, popular: true },
      { id: 104, name: "元に戻す", cat: "ショートカット", desc: "直前の操作を取り消します。", example: "Ctrl + Z", keywords: ["戻す"], related: [105], type: "shortcut", difficulty: 1, popular: true },
    ];

    function App() {
      const [search, setSearch] = useState("");
      const [cat, setCat] = useState("すべて");
      const [copiedId, setCopiedId] = useState(null);
      const [history, setHistory] = useState([]);

      const categories = useMemo(() => {
        const cats = new Set(DATABASE.map(d => d.cat));
        return ["すべて", ...Array.from(cats).sort()];
      }, []);

      const filtered = useMemo(() => {
        return DATABASE.filter(item => {
          if (cat !== "すべて" && item.cat !== cat) return false;
          if (!search.trim()) return true;
          const q = search.toLowerCase();
          return (
            item.name.toLowerCase().includes(q) ||
            item.desc.toLowerCase().includes(q) ||
            item.keywords.some(k => k.toLowerCase().includes(q))
          );
        });
      }, [search, cat]);

      const handleCopy = (text, id) => {
        navigator.clipboard.writeText(text).then(() => {
          setCopiedId(id);
          const item = DATABASE.find(d => d.id === id);
          setHistory(prev => 
            [{ id, name: item?.name, text, time: new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' }) }, ...prev].slice(0, 15)
          );
          setTimeout(() => setCopiedId(null), 2000);
        });
      };

      const getRelated = useCallback((id) => {
        const item = DATABASE.find(d => d.id === id);
        return item?.related ? DATABASE.filter(d => item.related.includes(d.id)) : [];
      }, []);

      return (
        <div style={{ minHeight: '100vh', backgroundColor: 'var(--bg-page)' }}>
          {/* ヘッダー */}
          <header style={{ background: `linear-gradient(135deg, var(--primary-dark), var(--primary))`, color: 'white', padding: '24px 16px', boxShadow: '0 2px 8px rgba(0,0,0,0.1)' }}>
            <div style={{ maxWidth: '1200px', margin: '0 auto' }}>
              <h1 style={{ fontSize: '20px', fontWeight: 'bold', letterSpacing: '2.5px', margin: 0 }}>
                PCスキル学習＆実践ナビ
              </h1>
              <p style={{ fontSize: '14px', opacity: 0.9, margin: '8px 0 0 0', fontWeight: 400 }}>
                関数・ショートカット検索。難易度と人気度で、あなたに合った学習が可能。
              </p>
            </div>
          </header>

          {/* メイン */}
          <main style={{ maxWidth: '1200px', margin: '0 auto', padding: '32px 16px' }}>
            {/* 検索セクション */}
            <div style={{ backgroundColor: 'var(--bg-card)', borderRadius: '12px', padding: '24px', marginBottom: '32px', border: `1px solid var(--border)`, boxShadow: '0 1px 3px rgba(0,0,0,0.05)' }}>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr auto', gap: '16px', marginBottom: '12px' }}>
                <input
                  type="text"
                  placeholder="例: SUM, IF, 合計, 検索..."
                  value={search}
                  onChange={(e) => setSearch(e.target.value)}
                  style={{
                    padding: '12px 16px',
                    border: `1px solid var(--border)`,
                    borderRadius: '8px',
                    fontSize: '14px',
                    fontFamily: 'inherit',
                    boxSizing: 'border-box'
                  }}
                />
                <select
                  value={cat}
                  onChange={(e) => setCat(e.target.value)}
                  style={{
                    padding: '12px 16px',
                    border: `1px solid var(--border)`,
                    borderRadius: '8px',
                    fontSize: '14px',
                    fontFamily: 'inherit',
                    backgroundColor: 'var(--bg-card)',
                    cursor: 'pointer',
                    minWidth: '180px'
                  }}
                >
                  {categories.map(c => (
                    <option key={c} value={c}>{c}</option>
                  ))}
                </select>
              </div>
              <p style={{ fontSize: '12px', color: 'var(--text-sub)', margin: 0 }}>
                {filtered.length} / {DATABASE.length} 件
              </p>
            </div>

            {/* 結果表示 */}
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 300px', gap: '24px' }}>
              {/* 関数リスト */}
              <div>
                {filtered.length === 0 ? (
                  <div style={{ textAlign: 'center', padding: '48px 24px', backgroundColor: 'var(--bg-card)', borderRadius: '12px', border: `2px dashed var(--border)` }}>
                    <p style={{ color: 'var(--text-sub)', fontWeight: 600, margin: 0 }}>該当する項目が見つかりません</p>
                  </div>
                ) : (
                  <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
                    {filtered.map(item => (
                      <div key={item.id} style={{ backgroundColor: 'var(--bg-card)', borderRadius: '12px', padding: '20px', border: `1px solid var(--border)`, borderLeft: `4px solid var(--primary)`, boxShadow: '0 1px 3px rgba(0,0,0,0.05)' }}>
                        {/* タイトル行 */}
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'start', marginBottom: '12px' }}>
                          <h3 style={{ fontSize: '16px', fontWeight: 'bold', margin: 0, color: 'var(--primary-dark)' }}>
                            {item.name}
                          </h3>
                          <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
                            {item.popular && (
                              <span style={{ fontSize: '11px', padding: '4px 10px', backgroundColor: '#FFE5E5', color: '#B36060', borderRadius: '12px', fontWeight: '700', whiteSpace: 'nowrap' }}>
                                ★ 人気
                              </span>
                            )}
                            <span style={{ fontSize: '12px', padding: '4px 12px', backgroundColor: 'var(--primary-light)', color: 'var(--primary-dark)', borderRadius: '20px', fontWeight: '600' }}>
                              {item.cat}
                            </span>
                          </div>
                        </div>
                        
                        {/* 難易度 */}
                        <div style={{ marginBottom: '12px' }}>
                          <span style={{ fontSize: '12px', fontWeight: '600', color: 'var(--text-sub)' }}>難易度：</span>
                          <span style={{ marginLeft: '8px', fontSize: '14px', letterSpacing: '2px' }}>
                            {item.difficulty === 1 ? '⭐ 初級' : item.difficulty === 2 ? '⭐⭐ 中級' : '⭐⭐⭐ 上級'}
                          </span>
                        </div>

                        {/* 説明 */}
                        <p style={{ fontSize: '14px', color: 'var(--text-main)', marginBottom: '16px', lineHeight: '1.5' }}>
                          {item.desc}
                        </p>

                        {/* ユースケース */}
                        {item.usecase && (
                          <div style={{ backgroundColor: '#FDF6EE', borderRadius: '8px', padding: '12px', marginBottom: '16px', border: '1px solid #E9A400', fontSize: '13px', lineHeight: '1.6', color: '#5D4C2C' }}>
                            <strong style={{ color: '#8A6030' }}>💡 こんなとき：</strong> {item.usecase}
                          </div>
                        )}

                        {/* コピーボタン */}
                        <div style={{ backgroundColor: 'var(--primary-light)', borderRadius: '8px', padding: '12px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: '12px', marginBottom: item.related?.length > 0 ? '16px' : 0 }}>
                          <code style={{ fontSize: '13px', fontFamily: 'monospace', color: 'var(--text-main)', flex: 1, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                            {item.example}
                          </code>
                          <button
                            onClick={() => handleCopy(item.example, item.id)}
                            style={{
                              padding: '8px 16px',
                              backgroundColor: copiedId === item.id ? 'var(--primary)' : '#FFF',
                              color: copiedId === item.id ? '#FFF' : 'var(--text-main)',
                              border: `1px solid ${copiedId === item.id ? 'var(--primary)' : 'var(--border)'}`,
                              borderRadius: '6px',
                              cursor: 'pointer',
                              fontSize: '13px',
                              fontWeight: '600',
                              whiteSpace: 'nowrap',
                              transition: 'all 0.2s'
                            }}
                          >
                            {copiedId === item.id ? '✓ 完了' : 'コピー'}
                          </button>
                        </div>

                        {/* 関連関数 */}
                        {getRelated(item.id).length > 0 && (
                          <div style={{ backgroundColor: 'var(--primary-light)', borderRadius: '8px', padding: '12px', border: `1px solid var(--primary)` }}>
                            <p style={{ fontSize: '11px', fontWeight: '700', textTransform: 'uppercase', color: 'var(--primary-dark)', margin: '0 0 8px 0' }}>
                              関連関数
                            </p>
                            <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px' }}>
                              {getRelated(item.id).map(rel => (
                                <button
                                  key={rel.id}
                                  onClick={() => setSearch(rel.name)}
                                  style={{
                                    padding: '6px 12px',
                                    backgroundColor: 'var(--bg-card)',
                                    border: `1px solid var(--border)`,
                                    borderRadius: '6px',
                                    fontSize: '12px',
                                    fontWeight: '600',
                                    cursor: 'pointer',
                                    color: 'var(--text-main)',
                                    transition: 'all 0.2s'
                                  }}
                                  onMouseEnter={(e) => { e.target.style.backgroundColor = 'var(--primary-light)'; e.target.style.borderColor = 'var(--primary)'; }}
                                  onMouseLeave={(e) => { e.target.style.backgroundColor = 'var(--bg-card)'; e.target.style.borderColor = 'var(--border)'; }}
                                >
                                  → {rel.name}
                                </button>
                              ))}
                            </div>
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                )}
              </div>

              {/* サイドバー：コピー履歴 */}
              <div style={{ backgroundColor: 'var(--bg-card)', borderRadius: '12px', padding: '20px', border: `1px solid var(--border)`, height: 'fit-content', position: 'sticky', top: '20px' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px', paddingBottom: '12px', borderBottom: `1px solid var(--border)` }}>
                  <h2 style={{ fontSize: '14px', fontWeight: 'bold', margin: 0, color: 'var(--text-main)' }}>
                    📋 コピー履歴
                  </h2>
                  {history.length > 0 && (
                    <button
                      onClick={() => setHistory([])}
                      style={{
                        fontSize: '12px',
                        color: 'var(--text-sub)',
                        background: 'none',
                        border: 'none',
                        cursor: 'pointer',
                        padding: '4px 8px',
                        transition: 'color 0.2s'
                      }}
                      onMouseEnter={(e) => e.target.style.color = 'var(--danger)'}
                      onMouseLeave={(e) => e.target.style.color = 'var(--text-sub)'}
                    >
                      クリア
                    </button>
                  )}
                </div>

                <div style={{ maxHeight: '400px', overflowY: 'auto' }} className="custom-scrollbar">
                  {history.length === 0 ? (
                    <p style={{ fontSize: '12px', color: 'var(--text-sub)', textAlign: 'center', margin: '24px 0' }}>
                      まだ履歴がありません
                    </p>
                  ) : (
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                      {history.map((item, idx) => (
                        <div key={idx} style={{ backgroundColor: 'var(--bg-page)', borderRadius: '6px', padding: '8px', fontSize: '12px', border: `1px solid var(--border)` }}>
                          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '4px' }}>
                            <strong style={{ color: 'var(--text-main)', fontSize: '13px' }}>{item.name}</strong>
                            <span style={{ color: 'var(--text-sub)', fontSize: '11px' }}>{item.time}</span>
                          </div>
                          <code style={{ fontSize: '11px', color: 'var(--text-sub)', fontFamily: 'monospace' }}>
                            {item.text}
                          </code>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
